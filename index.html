<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safari Entertainment</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #0b0b0f; color: #fff; }

    /* Navbar */
    nav {
      position: sticky; top: 0; width: 100%;
      background: rgba(11,11,15,0.4);
      backdrop-filter: blur(8px);
      padding: 15px 40px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 1000;
    }
    .logo { font-size: 1.5rem; font-weight: 700; color: #ff4da6; letter-spacing: 2px; }

    /* Desktop Menu */
    .nav-links { display: flex; list-style: none; }
    .nav-links li { margin-left: 25px; position: relative; }
    .nav-links li a {
      font-weight: 500; transition: color 0.3s;
    }
.nav-links li a::after {
      content: ''; position: absolute; left: 0; bottom: -5px;
      width: 0%; height: 2px; background: #ff4da6;
      transition: width 0.3s;
    }
    .nav-links li a:hover { color: #b366ff; }
    .nav-links li a:hover::after { width: 100%; }

    /* Hamburger */
    .hamburger {
      display: none; flex-direction: column; cursor: pointer;
      width: 25px; height: 20px; justify-content: space-between;
    }
    .hamburger span {
      display: block; height: 3px; background: #fff; border-radius: 2px;
      transition: all 0.3s ease;
    }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

 /* Mobile Menu */
    .mobile-menu {
      position: fixed; top: 0; right: -100%;
      width: 70%; height: 100%;
      background: #0b0b0f;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: right 0.4s ease;
      z-index: 999;
    }
    .mobile-menu.active { right: 0; }
    .mobile-menu ul { list-style: none; text-align: center; }
    .mobile-menu ul li { margin: 20px 0; }
    .mobile-menu ul li a { font-size: 1.2rem; color: #fff; transition: color 0.3s; }
    .mobile-menu ul li a:hover { color: #ff4da6; }

    /* Overlay */
    .overlay {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      opacity: 0; visibility: hidden;
      transition: opacity 0.4s ease;
      z-index: 998;
    }
.overlay.active { opacity: 1; visibility: visible; }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="logo">Safari Entertainment</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#auditions">Auditions</a></li>
      <li><a href="#programs">Training</a></li>
      <li><a href="#girlgroup">Girl Group</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </nav>
 <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#auditions">Auditions</a></li>
      <li><a href="#programs">Training</a></li>
      <li><a href="#girlgroup">Girl Group</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </div>
<!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <script>
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    const overlay = document.getElementById('overlay');
    const menuLinks = mobileMenu.querySelectorAll('a');

    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('active');
      mobileMenu.classList.toggle('active');
      overlay.classList.toggle('active');
    });

    overlay.addEventListener('click', () => {
      hamburger.classList.remove('active');
      mobileMenu.classList.remove('active');
      overlay.classList.remove('active');
    });

    menuLinks.forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('active');
        mobileMenu.classList.remove('active');
        overlay.classList.remove('active');
      });
 });
  </script>

</body>
</html>
